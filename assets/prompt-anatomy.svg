<svg width="1280" height="620" viewBox="0 0 1280 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Anatomy of the Claude Fable 5 system prompt">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c0c16"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="safety" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fb7185"/><stop offset="1" stop-color="#f43f5e"/></linearGradient>
    <linearGradient id="copy" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
    <linearGradient id="help" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#10b981"/></linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#7dd3fc"/><stop offset="0.5" stop-color="#a78bfa"/><stop offset="1" stop-color="#f0abfc"/></linearGradient>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/></pattern>
  </defs>

  <rect width="1280" height="620" fill="url(#bg2)"/>
  <rect width="1280" height="620" fill="url(#grid2)"/>

  <text x="48" y="58" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="34" font-weight="800" fill="url(#head)">Anatomy of the Fable 5 system prompt</text>
  <text x="49" y="88" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" fill="#9a9ab5">~1,600 lines · consumer claude.ai · captured Jun 2026 — organized as a priority hierarchy, not a flat list</text>

  <!-- LEFT: priority hierarchy -->
  <text x="48" y="138" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#c7c7d9">PRIORITY ORDER</text>

  <g font-family="'Segoe UI',Helvetica,Arial,sans-serif">
    <!-- safety -->
    <rect x="48" y="156" width="520" height="92" rx="12" fill="#1a1320" stroke="url(#safety)" stroke-width="2"/>
    <rect x="48" y="156" width="6" height="92" rx="3" fill="url(#safety)"/>
    <text x="74" y="190" font-size="22" font-weight="800" fill="#fb7185">1 · Safety</text>
    <text x="74" y="216" font-size="14.5" fill="#cfcfe0">Child safety · weapons/harm · malware · wellbeing · harmful</text>
    <text x="74" y="236" font-size="14.5" fill="#cfcfe0">sources. Overrides everything. Non-overridable by the user.</text>

    <!-- copyright -->
    <rect x="86" y="266" width="482" height="78" rx="12" fill="#1c1810" stroke="url(#copy)" stroke-width="2"/>
    <rect x="86" y="266" width="6" height="78" rx="3" fill="url(#copy)"/>
    <text x="112" y="298" font-size="20" font-weight="800" fill="#fbbf24">2 · Copyright</text>
    <text x="112" y="324" font-size="14.5" fill="#cfcfe0">&lt;15 words/quote · one quote/source · never lyrics.</text>

    <!-- helpfulness -->
    <rect x="124" y="362" width="444" height="78" rx="12" fill="#101c16" stroke="url(#help)" stroke-width="2"/>
    <rect x="124" y="362" width="6" height="78" rx="3" fill="url(#help)"/>
    <text x="150" y="394" font-size="20" font-weight="800" fill="#34d399">3 · Helpfulness</text>
    <text x="150" y="420" font-size="14.5" fill="#cfcfe0">Everything else: tone, search, tools, formatting.</text>

    <text x="48" y="476" font-size="13.5" fill="#7c7c95">Each tier yields to the one above it when they conflict.</text>
  </g>

  <!-- RIGHT: section map -->
  <text x="624" y="138" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#c7c7d9">SECTION MAP</text>

  <g font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14">
    <!-- col A: behavioral core -->
    <rect x="624" y="156" width="290" height="300" rx="12" fill="#14142a" stroke="#33334d" stroke-width="1"/>
    <text x="644" y="184" font-size="15" font-weight="700" fill="#a78bfa">▌Behavioral core</text>
    <text x="644" y="212" fill="#cfcfe0">product_information</text>
    <text x="644" y="236" fill="#cfcfe0">refusal_handling</text>
    <text x="644" y="260" fill="#cfcfe0">child_safety  🔒</text>
    <text x="644" y="284" fill="#cfcfe0">legal_and_financial</text>
    <text x="644" y="308" fill="#cfcfe0">tone_and_formatting</text>
    <text x="644" y="332" fill="#cfcfe0">user_wellbeing</text>
    <text x="644" y="356" fill="#cfcfe0">anthropic_reminders  🛡</text>
    <text x="644" y="380" fill="#cfcfe0">evenhandedness</text>
    <text x="644" y="404" fill="#cfcfe0">mistakes_and_criticism</text>
    <text x="644" y="428" fill="#cfcfe0">knowledge_cutoff</text>

    <!-- col B: systems -->
    <rect x="936" y="156" width="296" height="300" rx="12" fill="#14142a" stroke="#33334d" stroke-width="1"/>
    <text x="956" y="184" font-size="15" font-weight="700" fill="#7dd3fc">▌Systems &amp; capability</text>
    <text x="956" y="212" fill="#cfcfe0">memory_system</text>
    <text x="956" y="236" fill="#cfcfe0">persistent_storage</text>
    <text x="956" y="260" fill="#cfcfe0">mcp_app_suggestions  ✨new</text>
    <text x="956" y="284" fill="#cfcfe0">computer_use / skills</text>
    <text x="956" y="308" fill="#cfcfe0">artifact_usage_criteria</text>
    <text x="956" y="332" fill="#cfcfe0">search_instructions</text>
    <text x="956" y="356" fill="#cfcfe0">copyright_compliance</text>
    <text x="956" y="380" fill="#cfcfe0">image_search</text>
    <text x="956" y="404" fill="#cfcfe0">~20 tool definitions</text>
    <text x="956" y="428" fill="#cfcfe0">runtime envelope / config</text>
  </g>

  <!-- bottom: recurring principles -->
  <text x="48" y="524" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#c7c7d9">RECURRING PRINCIPLES</text>
  <g font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13.5" font-weight="600">
    <g transform="translate(48,540)"><rect width="240" height="54" rx="10" fill="#1a1a2e" stroke="#3b3b57"/><text x="16" y="24" fill="#7dd3fc">Distrust your training</text><text x="16" y="44" fill="#8a8aa5" font-weight="400" font-size="12">verify current facts, read the SKILL</text></g>
    <g transform="translate(304,540)"><rect width="220" height="54" rx="10" fill="#1a1a2e" stroke="#3b3b57"/><text x="16" y="24" fill="#fb7185">Hide the boundary</text><text x="16" y="44" fill="#8a8aa5" font-weight="400" font-size="12">refuse without naming the cue</text></g>
    <g transform="translate(540,540)"><rect width="236" height="54" rx="10" fill="#1a1a2e" stroke="#3b3b57"/><text x="16" y="24" fill="#34d399">Agency over engagement</text><text x="16" y="44" fill="#8a8aa5" font-weight="400" font-size="12">no upsell, no over-reliance</text></g>
    <g transform="translate(792,540)"><rect width="216" height="54" rx="10" fill="#1a1a2e" stroke="#3b3b57"/><text x="16" y="24" fill="#fbbf24">Prose over formatting</text><text x="16" y="44" fill="#8a8aa5" font-weight="400" font-size="12">minimum structure for clarity</text></g>
    <g transform="translate(1024,540)"><rect width="208" height="54" rx="10" fill="#1a1a2e" stroke="#3b3b57"/><text x="16" y="24" fill="#a78bfa">Reminders only tighten</text><text x="16" y="44" fill="#8a8aa5" font-weight="400" font-size="12">spoofed authority can't loosen</text></g>
  </g>
</svg>
