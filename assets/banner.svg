<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CL4R1T4S — System Prompt Archive and Analysis">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a12"/>
      <stop offset="0.5" stop-color="#10101f"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="title" x1="180" y1="120" x2="900" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>
  <rect width="1280" height="340" fill="url(#grid)"/>
  <ellipse cx="640" cy="150" rx="520" ry="220" fill="url(#glow)"/>

  <!-- terminal prompt mark -->
  <g transform="translate(96,150)" opacity="0.9">
    <path d="M0 -22 L26 0 L0 22" stroke="url(#accent)" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="34" y="14" width="34" height="7" rx="3.5" fill="url(#accent)"/>
  </g>

  <!-- title -->
  <text x="190" y="158" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="2" fill="url(#title)">CL4R1T4S</text>
  <text x="194" y="205" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="500" letter-spacing="4" fill="#c7c7d9">SYSTEM&#160;PROMPT&#160;ARCHIVE&#160;&#38;&#160;ANALYSIS</text>

  <line x1="194" y1="232" x2="900" y2="232" stroke="#2a2a3d" stroke-width="1.5"/>

  <!-- vendor chips -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="600">
    <g transform="translate(194,258)">
      <rect width="118" height="38" rx="19" fill="#1a1a2e" stroke="#3b3b57" stroke-width="1"/>
      <text x="59" y="25" text-anchor="middle" fill="#a78bfa">ANTHROPIC</text>
    </g>
    <g transform="translate(324,258)">
      <rect width="92" height="38" rx="19" fill="#1a1a2e" stroke="#3b3b57" stroke-width="1"/>
      <text x="46" y="25" text-anchor="middle" fill="#7dd3fc">OPENAI</text>
    </g>
    <g transform="translate(428,258)">
      <rect width="92" height="38" rx="19" fill="#1a1a2e" stroke="#3b3b57" stroke-width="1"/>
      <text x="46" y="25" text-anchor="middle" fill="#f0abfc">GOOGLE</text>
    </g>
    <g transform="translate(532,258)">
      <rect width="62" height="38" rx="19" fill="#1a1a2e" stroke="#3b3b57" stroke-width="1"/>
      <text x="31" y="25" text-anchor="middle" fill="#7dd3fc">xAI</text>
    </g>
    <g transform="translate(606,258)">
      <rect width="190" height="38" rx="19" fill="#1a1a2e" stroke="#3b3b57" stroke-width="1"/>
      <text x="95" y="25" text-anchor="middle" fill="#c7c7d9">+ 21 more vendors</text>
    </g>
  </g>

  <!-- right-side featured stamp -->
  <g transform="translate(1010,108)" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <rect x="0" y="0" width="184" height="124" rx="14" fill="#14142a" stroke="#3b3b57" stroke-width="1"/>
    <text x="92" y="34" text-anchor="middle" font-size="15" font-weight="700" letter-spacing="1" fill="#a78bfa">FEATURED</text>
    <text x="92" y="66" text-anchor="middle" font-size="40" font-weight="800" fill="#ffffff">Fable 5</text>
    <text x="92" y="96" text-anchor="middle" font-size="14" font-weight="500" fill="#9a9ab5">annotated + diffed</text>
  </g>
</svg>
